name: MSAF-1 Agent Tick — The Sandman

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:          # Manual trigger

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install httpx

      - name: Run MSAF-1 Tick (The Sandman)
        env:
          # API Keys
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          AGENT_WALLET_KEY: ${{ secrets.AGENT_WALLET_KEY }}

          # Upstash Redis for real-time state
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

          # MSAF-1 Settings
          DRY_RUN: "true"  # Set to "false" for live trading
          DARWIN_INTERVAL_H: "6"
          PORTFOLIO_START_USD: "200"

          # MEV Shield
          BSCSCAN_API_KEY: ${{ secrets.BSCSCAN_API_KEY }}

      - name: Run DARWIN Agent
        run: python -m agent.darwin

      - name: Upload Tick Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msaf1-tick-${{ github.run_number }}
          path: |
            logs/
            darwin_state.json
          retention-days: 7

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::warning::MSAF-1 tick failed. Check logs for details."
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
